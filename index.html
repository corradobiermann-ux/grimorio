<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modalità Combattimento - D&D 5e</title>
  <style>
    :root {
      --bg: #0f0d0a;
      --card-bg: rgba(24, 21, 18, 0.92);
      --card-border: #8b6e3d;
      --border-subtle: #3a3125;
      --accent-yellow: #f1c40f;
      --text-main: #e2d9cc;
      --text-muted: #a39580;
      --danger-red: #c0392b;
      --action-color: #e67e22;
      --bonus-color: #2980b9;
      --reaction-color: #8e44ad;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid var(--card-border);
    }

    h1 {
      color: var(--accent-yellow);
      font-size: 1.8rem;
    }

    .btn-back {
      background: transparent;
      border: 1px solid var(--accent-yellow);
      color: var(--accent-yellow);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
    }

    .btn-back:hover {
      background: var(--accent-yellow);
      color: #000;
    }

    /* GRIGLIA A 3 COLONNE */
    .combat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    @media (max-width: 900px) {
      .combat-grid {
        grid-template-columns: 1fr;
      }
    }

    .combat-column {
      background: rgba(18, 15, 12, 0.8);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .column-header {
      font-size: 1.2rem;
      font-weight: bold;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .header-action { background: rgba(230, 126, 34, 0.2); color: var(--action-color); border: 1px solid var(--action-color); }
    .header-bonus { background: rgba(41, 128, 185, 0.2); color: var(--bonus-color); border: 1px solid var(--bonus-color); }
    .header-reaction { background: rgba(142, 68, 173, 0.2); color: var(--reaction-color); border: 1px solid var(--reaction-color); }

    /* SCHEDE AZIONE */
    .action-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .action-title {
      font-weight: bold;
      font-size: 1rem;
      color: #fff;
      display: flex;
      justify-content: space-between;
    }

    .action-type-badge {
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    .badge-spell { background: #27ae60; color: #fff; }
    .badge-custom { background: #7f8c8d; color: #fff; }

    .action-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.3;
    }

    .btn-add-action {
      background: transparent;
      border: 1px dashed var(--accent-yellow);
      color: var(--accent-yellow);
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      text-align: center;
      transition: all 0.2s;
    }

    .btn-add-action:hover {
      background: rgba(241, 196, 15, 0.1);
    }
  </style>
</head>
<body>

  <header>
    <h1>⚔️ Modalità Combattimento</h1>
    <a href="index.html" class="btn-back">📖 Torna al Grimorio</a>
  </header>

  <main class="combat-grid">
    <!-- COLONNA 1: AZIONI -->
    <div class="combat-column">
      <div class="column-header header-action">⚔️ Azioni (1/Turno)</div>
      <div id="actionsList" class="actions-list"></div>
      <button class="btn-add-action" onclick="addCustomAction('action')">➕ Aggiungi Azione Custom</button>
    </div>

    <!-- COLONNA 2: AZIONI BONUS -->
    <div class="combat-column">
      <div class="column-header header-bonus">⚡ Azioni Bonus</div>
      <div id="bonusList" class="actions-list"></div>
      <button class="btn-add-action" onclick="addCustomAction('bonus')">➕ Aggiungi Azione Bonus</button>
    </div>

    <!-- COLONNA 3: REAZIONI -->
    <div class="combat-column">
      <div class="column-header header-reaction">🛡️ Reazioni</div>
      <div id="reactionsList" class="actions-list"></div>
      <button class="btn-add-action" onclick="addCustomAction('reaction')">➕ Aggiungi Reazione</button>
    </div>
  </main>

  <script>
    // Recupera incantesimi e custom actions dal LocalStorage
    const spells = JSON.parse(localStorage.getItem('dnd_custom_spells') || '[]');
    const preparedNames = JSON.parse(localStorage.getItem('dnd_prepared_spells') || '[]');
    let customActions = JSON.parse(localStorage.getItem('dnd_combat_custom_actions') || '[]');

    // Azioni Base D&D 5e di default
    const defaultActions = [
      { id: 'def1', type: 'action', title: 'Attacco Base', desc: 'Effettua un attacco ravvicinato o a distanza con un\'arma.', category: 'custom' },
      { id: 'def2', type: 'action', title: 'Schivare (Dodge)', desc: 'I tiri per colpirci hanno svantaggio e i TS su DES hanno vantaggio.', category: 'custom' },
      { id: 'def3', type: 'action', title: 'Disimpegnarsi (Disengage)', desc: 'I tuoi movimenti non provocano attacchi d\'opportunità per questo turno.', category: 'custom' },
      { id: 'def4', type: 'action', title: 'Scatto (Dash)', desc: 'Raddoppia la tua velocità per il turno attuale.', category: 'custom' },
      { id: 'def5', type: 'reaction', title: 'Attacco d\'Opportunità', desc: 'Quando un nemico esce dalla tua portata corporea.', category: 'custom' }
    ];

    function renderCombatView() {
      const actionsList = document.getElementById('actionsList');
      const bonusList = document.getElementById('bonusList');
      const reactionsList = document.getElementById('reactionsList');

      actionsList.innerHTML = '';
      bonusList.innerHTML = '';
      reactionsList.innerHTML = '';

      // 1. Render Azioni Predefinite & Custom
      const allCustom = [...defaultActions, ...customActions];
      allCustom.forEach(act => {
        const card = createActionCard(act.title, act.desc, 'custom');
        if (act.type === 'action') actionsList.appendChild(card);
        if (act.type === 'bonus') bonusList.appendChild(card);
        if (act.type === 'reaction') reactionsList.appendChild(card);
      });

      // 2. Render Incantesimi (Filtra solo quelli preparati o trucchetti/sempre preparati)
      spells.forEach(spell => {
        const isPrepared = preparedNames.includes(spell.nome) || spell.alwaysPrepared || isCantrip(spell);
        
        if (isPrepared) {
          const time = (spell.tempo_di_lancio || '').toLowerCase();
          const card = createActionCard(spell.nome, `${spell.livello_scuola} — ${spell.descrizione.substring(0, 100)}...`, 'spell');

          if (time.includes('bonus')) {
            bonusList.appendChild(card);
          } else if (time.includes('reazione') || time.includes('reaction')) {
            reactionsList.appendChild(card);
          } else if (time.includes('azione') || time.includes('action')) {
            actionsList.appendChild(card);
          }
        }
      });
    }

    function isCantrip(spell) {
      const text = (spell.livello_scuola || '').toLowerCase();
      return text.includes('trucchetto') || text.includes('0');
    }

    function createActionCard(title, desc, type) {
      const card = document.createElement('div');
      card.className = 'action-card';
      const badgeClass = type === 'spell' ? 'badge-spell' : 'badge-custom';
      const badgeText = type === 'spell' ? 'Incantesimo' : 'Abilità/Base';

      card.innerHTML = `
        <div class="action-title">
          <span>${title}</span>
          <span class="action-type-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="action-desc">${desc}</div>
      `;
      return card;
    }

    function addCustomAction(type) {
      const title = prompt("Nome dell'azione/abilità:");
      if (!title) return;
      const desc = prompt("Breve descrizione:");
      
      const newAction = {
        id: Date.now(),
        type: type,
        title: title,
        desc: desc || '',
        category: 'custom'
      };

      customActions.push(newAction);
      localStorage.setItem('dnd_combat_custom_actions', JSON.stringify(customActions));
      renderCombatView();
    }

    renderCombatView();
  </script>
</body>
</html>
